      <stop offset="0" stop-color="#18204a"/>
      <stop offset="0.38" stop-color="#070a18"/>
      <stop offset="1" stop-color="#02030a"/>
    </radialGradient>
    <radialGradient id="holeGlow" cx="50%" cy="50%" r="50%">
