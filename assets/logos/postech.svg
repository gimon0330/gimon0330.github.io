      <path d="M256 182c-44 0-80 22-105 56 8-62 46-101 105-101 59 0 97 39 105 101-25-34-61-56-105-56Z"/>
      <path d="M153 270c0-42 19-76 50-101-15 29-14 62 4 95l-57 57c2-17 3-34 3-51Z"/>
