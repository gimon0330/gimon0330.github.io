  </g>
  <text x="160" y="250" text-anchor="middle" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="36" font-weight="900" fill="#ffffff" letter-spacing="2">BSIS</text>
