  </defs>
  <rect width="320" height="320" rx="72" fill="#07111F"/>
  <circle cx="256" cy="76" r="94" fill="#ffffff" opacity="0.08"/>
  <circle cx="70" cy="252" r="112" fill="#ffffff" opacity="0.06"/>
